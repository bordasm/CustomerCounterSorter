# Single-package project; this file exists only to allow the postinstall
# build scripts below (pnpm blocks them by default for supply-chain safety).
packages: []

allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: true
  prisma: true

onlyBuiltDependencies:
  - "@prisma/client"
  - "@prisma/engines"
  - esbuild
  - prisma
